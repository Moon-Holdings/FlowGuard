<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <title>FlowGuard Checklist</title>
    <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js" type="text/javascript"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="bg-slate-50 p-6">
    <div class="max-w-sm mx-auto bg-white rounded-2xl shadow-xl border border-slate-100 p-6">
        <div class="flex items-center gap-3 mb-6">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center text-white shadow-lg">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
            </div>
            <div>
                <h1 class="text-lg font-bold text-slate-900">Pre-Send Safeguard</h1>
                <p class="text-xs text-slate-500 font-medium uppercase tracking-wider">FlowGuard IT Sales</p>
            </div>
        </div>

        <div class="space-y-4 mb-8">
            <label class="flex items-start gap-3 p-3 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer border border-transparent hover:border-slate-100">
                <input type="checkbox" id="check-attachments" class="mt-1 w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                <span class="text-sm text-slate-700 font-medium">I have verified all required quotes/BOMs are attached.</span>
            </label>
            
            <label class="flex items-start gap-3 p-3 rounded-xl hover:bg-slate-50 transition-colors cursor-pointer border border-transparent hover:border-slate-100">
                <input type="checkbox" id="check-recipients" class="mt-1 w-4 h-4 text-blue-600 rounded border-slate-300 focus:ring-blue-500">
                <span class="text-sm text-slate-700 font-medium">I have confirmed the recipients are correct for this deal.</span>
            </label>
        </div>

        <div class="flex flex-col gap-2">
            <button id="btn-confirm" class="w-full bg-blue-600 text-white py-3 rounded-xl font-bold text-sm shadow-md hover:bg-blue-700 transition-all active:scale-95 disabled:opacity-50 disabled:pointer-events-none" disabled>
                Confirm & Send
            </button>
            <button id="btn-cancel" class="w-full bg-white text-slate-500 py-3 rounded-xl font-bold text-sm hover:bg-slate-50 transition-all">
                Cancel
            </button>
        </div>
    </div>

    <script>
        Office.onReady(function () {
            const btnConfirm = document.getElementById('btn-confirm');
            const btnCancel = document.getElementById('btn-cancel');
            const check1 = document.getElementById('check-attachments');
            const check2 = document.getElementById('check-recipients');

            function updateButton() {
                btnConfirm.disabled = !(check1.checked && check2.checked);
            }

            check1.addEventListener('change', updateButton);
            check2.addEventListener('change', updateButton);

            btnConfirm.onclick = function() {
                Office.context.ui.messageParent(JSON.stringify({ confirmed: true }));
            };

            btnCancel.onclick = function() {
                Office.context.ui.messageParent(JSON.stringify({ confirmed: false }));
            };
        });
    </script>
</body>
</html>
